name: CI/CD Frontend

on:
  push:
    branches:
      - deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push image to ECR
        run: |
          docker build -t tienda-perritos-frontend .
          docker tag tienda-perritos-frontend:latest 476149723783.dkr.ecr.us-east-1.amazonaws.com/tienda-perritos-frontend:latest
          docker push 476149723783.dkr.ecr.us-east-1.amazonaws.com/tienda-perritos-frontend:latest

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region us-east-1 --name tienda-perritos-cluster

      - name: Deploy to EKS
        run: |
          kubectl rollout restart deployment/frontend -n tienda
          kubectl rollout status deployment/frontend -n tienda
        